spring.application.name=employee-service

spring.datasource.url=${DB_URL:jdbc}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Enable Spring SQL initialization so schema.sql and data.sql in classpath are executed on startup
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.sql.init.platform=postgres
spring.sql.init.continue-on-error=false

# Bulk Employee Creation Strategy
# Options: ASYNC, BATCH
app.bulk-creation.strategy=${BULK_CREATION_STRATEGY:ASYNC}

# Cache Configuration - Using Two-Level Cache Architecture
spring.cache.type=caffeine
spring.cache.cache-names=employees,employeeById,employeesByDepartment,employeeByEmail,searchResults,addresses,statistics

# Two-Level Cache Configuration
app.cache.l1.max-size=500
app.cache.l1.ttl-minutes=5
app.cache.l2.max-size=1000
app.cache.l2.ttl-minutes=30


# Cache Refresh Configuration
# L2 Cache Refresh from Database (CRON Schedule)
cache.refresh.l2-refresh-cron=${L2_REFRESH_CRON:0 0/30 * * * *}
cache.refresh.statistics-interval-ms=${STATS_INTERVAL_MS:900000}
cache.refresh.health-check-interval-ms=${HEALTH_CHECK_INTERVAL_MS:300000}

# Cache Statistics Logging (disabled by default)
cache.statistics.enabled=${CACHE_STATS_ENABLED:false}

# Legacy Configuration (kept for backward compatibility)
app.cache.refresh.l1-interval-minutes=5
app.cache.refresh.l2-interval-minutes=30
app.cache.refresh.stats-interval-minutes=15

# Disable EHCache verbose logs
logging.level.org.ehcache.core.EhcacheManager=WARN
logging.level.org.ehcache.jsr107.Eh107CacheManager=WARN



